<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaLand | Official Donate</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00a2ff;
            --bg: #0b0f19;
            --card-bg: #161b28;
            --modal-bg: #1c2333;
            --text: #ffffff;
            --accent: #fbd07c;
            --success: #ffcc00;
            --danger: #ff4747;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text);
            overflow-x: hidden;
        }

        header {
            padding: 120px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #004d99 0%, #0b0f19 70%);
            border-bottom: 2px solid rgba(0, 162, 255, 0.2);
            position: relative;
        }

        .logo { 
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900; 
            letter-spacing: 15px; 
            text-shadow: 0 0 30px rgba(0,162,255,0.6);
            margin: 0;
            text-transform: uppercase;
        }

        .container { max-width: 1200px; margin: -40px auto 60px; padding: 0 20px; position: relative; z-index: 5; }

        .nav-bar { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 50px; 
        }

        .nav-btn {
            padding: 15px 35px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-btn.active { 
            background: var(--primary); 
            box-shadow: 0 0 20px rgba(0,162,255,0.4);
            border-color: var(--primary);
        }

        .ranks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover { 
            transform: translateY(-15px); 
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .rank-id {
            position: absolute;
            top: 20px; left: 20px;
            font-weight: 900;
            color: rgba(255,255,255,0.1);
            font-size: 2rem;
        }

        .card-title { 
            font-size: 2rem; 
            font-weight: 900; 
            margin: 10px 0; 
            color: var(--primary);
            letter-spacing: 2px;
        }

        .price-tag { margin: 20px 0; }
        .old-p { text-decoration: line-through; color: var(--danger); font-size: 1rem; font-weight: 600; opacity: 0.7; }
        .new-p { font-size: 1.8rem; font-weight: 900; color: var(--success); display: block; }

        .buy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: auto;
        }

        .buy-btn:hover { filter: brightness(1.1); transform: scale(1.02); }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--modal-bg);
            width: 100%; max-width: 950px;
            border-radius: 30px;
            display: flex;
            position: relative;
            border: 1px solid var(--primary);
            max-height: 90vh;
            overflow: hidden;
        }

        .modal-side { flex: 1; padding: 40px; overflow-y: auto; }
        .modal-info { background: rgba(0,0,0,0.2); border-left: 1px solid rgba(255,255,255,0.05); }

        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 35px; cursor: pointer; color: #555; }

        .period-option {
            background: #0b111d;
            border: 2px solid #2d3446;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .period-option.active { border-color: var(--primary); background: rgba(0,162,255,0.1); }

        .input-nick {
            width: 100%; padding: 18px; background: #0b111d; border: 2px solid #2d3446;
            color: white; border-radius: 12px; font-size: 1rem; margin: 20px 0; box-sizing: border-box;
        }

        .list-title { color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .feature-list { list-style: none; padding: 0; margin-bottom: 25px; }
        .feature-list li { margin-bottom: 10px; font-size: 0.95rem; color: #ccc; display: flex; gap: 10px; }
        .feature-list li::before { content: "⚡"; color: var(--primary); }

        @media (max-width: 850px) {
            .modal-content { flex-direction: column; }
            .modal-side { padding: 30px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">NOVALAND</div>
    <div style="color:var(--accent); font-weight: 800; margin-top: 15px; letter-spacing: 3px;">IP: NOVALAND.PRO | PORT: 31005</div>
</header>

<div class="container">
    <div class="nav-bar">
        <button class="nav-btn active">Привилегиялар</button>
        <button class="nav-btn" onclick="alert('Жақында...')">Кейстер</button>
    </div>

    <div class="ranks-grid" id="ranksGrid"></div>
</div>

<div id="rankModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <div class="modal-side">
            <h2 id="mTitle" style="font-size: 2.5rem; margin: 0 0 30px 0; font-weight: 900; color: var(--primary);">RANK</h2>
            <div id="periodBox"></div>
            <input type="text" id="nickInput" class="input-nick" placeholder="Ойын нигіңізді жазыңыз">
            <button class="buy-btn" style="width:100%" onclick="confirmPayment()">Сатып алу</button>
        </div>

        <div class="modal-side modal-info">
            <span class="list-title">Командалар:</span>
            <ul id="mCmds" class="feature-list"></ul>
            
            <span class="list-title">Мүмкіндіктер:</span>
            <ul id="mFeatures" class="feature-list"></ul>
        </div>
    </div>
</div>

<script>
    const ranks = [
        {
            id: 1, name: 'ɴᴏᴋᴇʀ', old: 990, base: 190,
            prices: { month1: 190, month3: 590, permanent: 990 },
            cmds: ['/kit noker', '/hat', '/feed'],
            features: ['3 home', '5 ah']
        },
        {
            id: 2, name: 'sᴀʀʙᴀᴢ', old: 1290, base: 490,
            prices: { month1: 490, month3: 890, permanent: 1290 },
            cmds: ['/kit sarbaz', '/ec', '/craft'],
            features: ['4 home', '6 ah']
        },
        {
            id: 3, name: 'ʙᴀᴛʏʀ', old: 1590, base: 790,
            prices: { month1: 790, month3: 1190, permanent: 1590 },
            cmds: ['/kit batyr', '/ext', '/clear', '/suicide', '/rtp far'],
            features: ['5 home', '7 ah']
        },
        {
            id: 4, name: 'ᴋᴇʀᴇʏ', old: 1990, base: 1090,
            prices: { month1: 1090, month3: 1590, permanent: 1990 },
            cmds: ['/kit kerey', '/repair hand', '/top', '/ignore'],
            features: ['6 home', '8 ah']
        },
        {
            id: 5, name: 'ᴋᴏsᴇᴍ', old: 3190, base: 1490,
            prices: { month1: 1490, month3: 2390, permanent: 3190 },
            cmds: ['/kit kosem', '/heal', '/bc', '/near', '/fly'],
            features: ['8 home', '10 ah']
        },
        {
            id: 6, name: 'ʜᴀɴ', old: 3690, base: 1790,
            prices: { month1: 1790, month3: 2690, permanent: 3690 },
            cmds: ['/kit han', '/ptime', '/pweather', '/invsee', '/anvil'],
            features: ['10 home', '14 ah']
        },
        {
            id: 7, name: 'ᴜʟʏʜᴀɴ', old: 6490, base: 2590,
            prices: { month1: 2590, month3: 4590, permanent: 6490 },
            cmds: ['/kit ulyhan', '/speed fly', '/repair all', '/endersee'],
            features: ['12 home', '16 ah']
        },
        {
            id: 8, name: 'ɴᴏᴠᴀ', old: 7390, base: 3190,
            prices: { month1: 3190, month3: 5290, permanent: 7390 },
            cmds: ['/kit nova', '/grant', '/grindstone', 'rtp base'],
            features: ['Төмендегі барлық артықшылықтар', 'Home: 14']
        }
    ];

    let currentRank = null;
    let selPrice = 0;
    let selPeriod = "";

    function init() {
        const grid = document.getElementById('ranksGrid');
        grid.innerHTML = ranks.map(r => `
            <div class="card">
                <span class="rank-id">${r.id}</span>
                <h3 class="card-title">${r.name}</h3>
                <div class="price-tag">
                    <span class="old-p">${r.old}₸</span>
                    <span class="new-p">${r.base}₸</span>
                </div>
                <button class="buy-btn" onclick="openRank(${r.id})">Таңдау</button>
            </div>
        `).join('');
    }

    function openRank(id) {
        const r = ranks.find(x => x.id === id);
        currentRank = r;
        
        document.getElementById('mTitle').innerText = r.name;
        document.getElementById('mCmds').innerHTML = r.cmds.map(c => `<li>${c}</li>`).join('');
        document.getElementById('mFeatures').innerHTML = r.features.map(f => `<li>${f}</li>`).join('');
        
        const pb = document.getElementById('periodBox');
        pb.innerHTML = `
            <div class="period-option active" onclick="selectPeriod(this, ${r.prices.month1}, '1 ай')">
                <span>1 ай</span> <b>${r.prices.month1}₸</b>
            </div>
            <div class="period-option" onclick="selectPeriod(this, ${r.prices.month3}, '3 ай')">
                <span>3 ай</span> <b>${r.prices.month3}₸</b>
            </div>
            <div class="period-option" onclick="selectPeriod(this, ${r.prices.permanent}, 'Мәңгілік')">
                <span>Мәңгілік</span> <b>${r.prices.permanent}₸</b>
            </div>
        `;
        
        selPrice = r.prices.month1;
        selPeriod = "1 ай";
        document.getElementById('rankModal').style.display = 'flex';
    }

    function selectPeriod(el, price, period) {
        document.querySelectorAll('.period-option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        selPrice = price;
        selPeriod = period;
    }

    function closeModal() {
        document.getElementById('rankModal').style.display = 'none';
    }

    function confirmPayment() {
        const nick = document.getElementById('nickInput').value;
        if(!nick) return alert('Нигіңізді жазыңыз!');
        
        const message = `Сәлем! Мен ${currentRank.name} (${selPeriod}) сатып алғым келеді.\nНик: ${nick}\nБағасы: ${selPrice}₸`;
        const url = `https://t.me/tornado437?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    }

    init();
</script>

</body>
</html>
